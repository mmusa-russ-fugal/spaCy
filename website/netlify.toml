# Settings in the [build] context are global and are applied to
# all contexts unless otherwise overridden by more specific contexts.
[build]
  # Directory that contains the deploy-ready HTML files and
  # assets generated by the build. This is relative to the base
  # directory if one has been set, or the root directory if
  # a base has not been set. This sample publishes the directory
  # located at the absolute path "root/project/build-output"
  publish = "website/out"

  # Default build command.
  command = "npm run build"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# The service worker must never be served from HTTP caches: browsers
# re-check /sw.js on navigation, and a cached copy would delay updates
# (including any future kill switch) from reaching returning visitors.
# With `output: 'export'`, headers() in next.config.mjs does not apply,
# so this must live at the hosting layer. Netlify already serves .js as
# application/javascript; Content-Type is set explicitly for safety.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"
